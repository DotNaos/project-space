name: Main Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: stable-release
  cancel-in-progress: true

jobs:
  stable-release:
    name: stable-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build macOS packages
        run: pnpm package:mac
        env:
          RELEASE_CHANNEL: stable
          RELEASE_SHA: ${{ github.sha }}

      - name: Set release metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "name=Stable (${GITHUB_SHA::7})" >> "$GITHUB_OUTPUT"

      - name: Upload stable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: project-space-stable-${{ steps.meta.outputs.short_sha }}-macos
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      - name: Publish stable release
        run: node scripts/ci/create-or-update-release.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CHANNEL: stable
          RELEASE_TAG: stable-latest
          RELEASE_NAME: ${{ steps.meta.outputs.name }}
          RELEASE_TARGET_SHA: ${{ github.sha }}
          RELEASE_PRERELEASE: "false"
          RELEASE_LATEST: "true"
          RELEASE_NOTES: Stable build for ${{ github.sha }}.
