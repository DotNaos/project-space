name: CI

on:
  pull_request:
  push:
    branches: [main, connector-release-v0.2.0, codex/fullstack-architecture]

jobs:
  web-backend:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install
      - run: bun run web:build
      - run: bun run backend:check
      - run: bun run backend:build
      - run: bun run desktop:macos:build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t project-space:ci .
