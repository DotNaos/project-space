name: PR Canary

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: canary-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  canary:
    name: canary
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build macOS packages
        run: pnpm package:mac
        env:
          RELEASE_CHANNEL: canary
          RELEASE_SHA: ${{ github.sha }}

      - name: Set release metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "tag=canary-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "name=Canary PR #${{ github.event.pull_request.number }} (${GITHUB_SHA::7})" >> "$GITHUB_OUTPUT"

      - name: Upload canary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: project-space-canary-pr-${{ github.event.pull_request.number }}-${{ steps.meta.outputs.short_sha }}-macos
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      - name: Publish canary prerelease
        run: node scripts/ci/create-or-update-release.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CHANNEL: canary
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.name }}
          RELEASE_TARGET_SHA: ${{ github.sha }}
          RELEASE_PRERELEASE: "true"
          RELEASE_NOTES: Canary build for PR #${{ github.event.pull_request.number }} at ${{ github.sha }}.
